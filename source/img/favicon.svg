<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#40916c"/>
      <stop offset="100%" stop-color="#74c69d"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.25)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- 背景圆角方块 -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <!-- 光泽层 -->
  <rect width="100" height="50" rx="22" fill="url(#glow)"/>

  <!-- U 字形主体（描边路径，科技感线条风） -->
  <path d="M27 22 L27 60 Q27 80 50 80 Q73 80 73 60 L73 22"
        stroke="white" stroke-width="11"
        stroke-linecap="round" stroke-linejoin="round"
        fill="none"/>

  <!-- 顶部左侧科技点 -->
  <circle cx="27" cy="17" r="5" fill="white" opacity="0.9"/>
  <!-- 顶部右侧科技点 -->
  <circle cx="73" cy="17" r="5" fill="white" opacity="0.9"/>

  <!-- 左侧短横线（电路感） -->
  <line x1="10" y1="17" x2="22" y2="17"
        stroke="white" stroke-width="2.5"
        stroke-linecap="round" opacity="0.6"/>
  <!-- 右侧短横线 -->
  <line x1="78" y1="17" x2="90" y2="17"
        stroke="white" stroke-width="2.5"
        stroke-linecap="round" opacity="0.6"/>

  <!-- 底部中心点 -->
  <circle cx="50" cy="80" r="3.5" fill="white" opacity="0.7"/>
</svg>
